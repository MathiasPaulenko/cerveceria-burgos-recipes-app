name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +'%Y.%m.%d')
          EXISTING=$(git tag -l "v${DATE}.*" | sort -V | tail -n 1 | sed 's/.*\.//')
          if [ -z "$EXISTING" ]; then
            COUNT=1
          else
            COUNT=$((EXISTING + 1))
          fi
          TAG="v${DATE}.${COUNT}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ needs.build.outputs.tag }} \
            --title "Release ${{ needs.build.outputs.tag }}" \
            --generate-notes \
            --target ${{ github.sha }}

  apk:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p $ANDROID_HOME/cmdline-tools
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "build-tools;34.0.0" "platforms;android-34" >/dev/null 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Install Bubblewrap core and Gradle
        run: |
          npm install @bubblewrap/core
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Generate signing key
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Recetas Burgos,O=Cerveceria Burgos,C=ES"

      - name: Build APK
        run: node scripts/build-apk.cjs

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ needs.build.outputs.tag }} ./app-release-signed.apk --clobber
