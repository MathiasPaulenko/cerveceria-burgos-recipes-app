name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          case "$LAST_MSG" in
            "chore(release):"*)
              echo "Skipping version bump"
              exit 0
              ;;
          esac
          node scripts/bump-version.cjs
          if [ -n "$(git status --porcelain)" ]; then
            git add package.json package-lock.json twa-manifest.json src/components/Layout.tsx
            git commit -m "chore(release): bump version [skip ci]"
            git push origin HEAD:main
            git reset --hard origin/main
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Get semantic version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${VERSION}"

      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.build.outputs.tag }}

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "Creating release for tag ${{ needs.build.outputs.tag }}"
          gh release create ${{ needs.build.outputs.tag }} \
            --title "Release ${{ needs.build.outputs.tag }}" \
            --generate-notes \
            --verify-tag || echo "Release may already exist"

  apk:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.build.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p $ANDROID_HOME/cmdline-tools
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "build-tools;34.0.0" "platforms;android-34" >/dev/null 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Install Bubblewrap core and Gradle
        run: |
          npm install @bubblewrap/core
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.11.1/bin" >> $GITHUB_PATH

      - name: Build APK
        run: node scripts/build-apk.cjs

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "Uploading APK to release ${{ needs.build.outputs.tag }}"
          APK_FILE=$(ls ./cerveceria-burgos-recipes-*.apk | head -1)
          ls -la "$APK_FILE"
          gh release upload ${{ needs.build.outputs.tag }} "$APK_FILE" --clobber
          echo "APK uploaded successfully: $(basename "$APK_FILE")"
