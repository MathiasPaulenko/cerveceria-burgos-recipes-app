<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#99120f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/png" href="./icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Cervecería Burgos — Recetas</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <div id="debug-errors" style="display:none; padding:16px; font-family:monospace; font-size:14px; color:#fff; background:#99120f; white-space:pre-wrap; word-break:break-word;"></div>
    <script>
      (function() {
        var debug = document.getElementById('debug-errors');
        var errors = [];
        function show(msg) { errors.push(msg); if(debug){debug.style.display='block';debug.textContent=errors.join('\n');} }
        window.onerror = function(msg, url, line, col, err) { show('ERROR: ' + msg + ' @ ' + (url||'') + ':' + line + ':' + col); };
        window.addEventListener('error', function(e) { show('EVENT ERROR: ' + e.message); });
        window.addEventListener('unhandledrejection', function(e) { show('PROMISE REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason))); });
        setTimeout(function() {
          var root = document.getElementById('root');
          if (!root || root.children.length === 0) {
            show('TIMEOUT: App did not render after 3s');
            show('URL: ' + location.href);
            show('Protocol: ' + location.protocol);
            show('UA: ' + navigator.userAgent);
          }
        }, 3000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
